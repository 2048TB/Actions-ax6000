name: OpenWrt Builder

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: openwrt-builder-${{ github.ref }}
  cancel-in-progress: true

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_SH: diy.sh
  CACHE_VERSION: v1
  CCACHE_DIR: ${{ github.workspace }}/openwrt/.ccache
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar file flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown "$USER:$(id -gn)" /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone --filter=blob:none --single-branch --depth=1 $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Prepare cache directories
      run: |
        mkdir -p openwrt/dl
        mkdir -p openwrt/.ccache

    - name: Restore build cache
      uses: actions/cache@v4
      with:
        path: |
          openwrt/dl
          openwrt/.ccache
        key: ${{ runner.os }}-${{ env.REPO_BRANCH }}-${{ env.CACHE_VERSION }}-${{ hashFiles('.config', 'diy.sh', '.github/workflows/openwrt-builder.yml') }}
        restore-keys: |
          ${{ runner.os }}-${{ env.REPO_BRANCH }}-${{ env.CACHE_VERSION }}-
          ${{ runner.os }}-${{ env.REPO_BRANCH }}-
          ${{ runner.os }}-

    - name: Load custom feeds
      run: |
        bash -n $DIY_SH
        [ -e $FEEDS_CONF ] && cp -f $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_SH pre

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -d files ] && rsync -a files/ openwrt/files/
        [ -e $CONFIG_FILE ] && cp -f $CONFIG_FILE openwrt/.config
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_SH post

    - name: Validate custom configuration
      run: |
        cd openwrt
        make defconfig
        ./scripts/diffconfig.sh > custom-config.diff
        echo "Resolved config delta:"
        sed -n '1,220p' custom-config.diff

        required_symbols=(
          "CONFIG_TARGET_mediatek_filogic_DEVICE_xiaomi_redmi-router-ax6000-ubootmod"
          "CONFIG_PACKAGE_luci"
          "CONFIG_PACKAGE_luci-app-passwall"
          "CONFIG_PACKAGE_luci-i18n-passwall-zh-cn"
          "CONFIG_PACKAGE_luci-app-passwall_Iptables_Transparent_Proxy"
          "CONFIG_CCACHE"
          "CONFIG_PACKAGE_kmod-sched-fq"
          "CONFIG_PACKAGE_kmod-tcp-bbr"
        )

        for sym in "${required_symbols[@]}"; do
          if ! grep -q "^${sym}=y$" .config; then
            echo "::error::Missing required option after defconfig: ${sym}=y"
            exit 1
          fi
        done

    - name: Download package
      id: package
      run: |
        cd openwrt
        make download -j"$(nproc)"
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        ccache -M 2G
        ccache -s || true
        make -j$(nproc) || make -j1 || make -j1 V=s
        ccache -s || true
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Generate release tag
      id: tag
      if: steps.organize.outputs.status == 'success' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M%S")-${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT
        echo "Build from $REPO_URL ($REPO_BRANCH)." > release.txt
        echo "Device: ${{ env.DEVICE_NAME }}" >> release.txt
        echo "Date: ${{ env.FILE_DATE }}" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*
